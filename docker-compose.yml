services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: onchain3d
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: onchain3d
      DB_USER: postgres
      DB_PASSWORD: postgres
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      HELIUS_API_KEY: ${HELIUS_API_KEY:-}
      ALCHEMY_API_KEY: ${ALCHEMY_API_KEY:-}
      VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID:-trial-project-mawl}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-us-central1}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_BACKEND_URL: ""
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
