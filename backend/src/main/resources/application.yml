spring:
  application:
    name: onchain-3d-explorer
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:onchain3d}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:onchain3d}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:onchain3d}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  vertex:
    project-id: ${VERTEX_PROJECT_ID:}
    location: ${VERTEX_LOCATION:us-central1}
    llm-model: ${VERTEX_MODEL:gemini-1.5-flash}
    embed-model: ${VERTEX_EMBED_MODEL:text-embedding-004}
  ingest:
    helius-api-key: ${HELIUS_API_KEY:}
    alchemy-api-key: ${ALCHEMY_API_KEY:}
    window-default: ${WINDOW_DEFAULT:1h}
    value-floor-norm: ${VALUE_FLOOR_NORM:0.01}
  copilot:
    max-agent-steps: ${MAX_AGENT_STEPS:3}

logging:
  level:
    com.maul.onchain3d: INFO
    org.springframework.web: WARN
